name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify release version metadata
        run: |
          expected_version="${GITHUB_REF_NAME#v}"
          cli_source_version="$(
            sed -n 's/^const VERSION : String = "\(.*\)"$/\1/p' cmd/main/main.mbt
          )"
          module_version="$(
            python3 -c 'import json; print(json.load(open("moon.mod.json"))["version"])'
          )"

          if [ -z "$cli_source_version" ]; then
            echo "cmd/main/main.mbt VERSION was not found" >&2
            exit 1
          fi

          if [ "$cli_source_version" != "$expected_version" ]; then
            echo "cmd/main/main.mbt VERSION is ${cli_source_version}, expected ${expected_version}" >&2
            exit 1
          fi

          if [ "$module_version" != "$expected_version" ]; then
            echo "moon.mod.json version is ${module_version}, expected ${expected_version}" >&2
            exit 1
          fi

  create-release:
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - name: Create release if needed
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          gh release view "$VERSION" --repo "$REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$VERSION" --repo "$REPOSITORY" --title "$VERSION" --notes "apispec $VERSION"

  build:
    needs: create-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os: linux
            arch: x64
          # The MoonBit installer currently rejects Darwin x86_64.
          - runner: macos-14
            os: macos
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Update MoonBit registry
        run: moon update

      - name: Build binary
        run: |
          expected_version="${GITHUB_REF_NAME#v}"
          moon build cmd/main --target native --release --strip
          mkdir -p dist
          asset="apispec-${GITHUB_REF_NAME}-${{ matrix.os }}-${{ matrix.arch }}"
          cp _build/native/release/build/cmd/main/main.exe "dist/${asset}"
          chmod +x "dist/${asset}"
          actual_version="$("dist/${asset}" version)"
          if [ "$actual_version" != "$expected_version" ]; then
            echo "built binary version is ${actual_version}, expected ${expected_version}" >&2
            exit 1
          fi
          echo "$actual_version"

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.ref_name }}
        run: |
          gh release upload "$VERSION" dist/* --clobber
