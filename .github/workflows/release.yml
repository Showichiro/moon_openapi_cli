name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create release if needed
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          gh release view "$VERSION" --repo "$REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$VERSION" --repo "$REPOSITORY" --title "$VERSION" --notes "apispec $VERSION"

  build:
    needs: create-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os: linux
            arch: x64
          # The MoonBit installer currently rejects Darwin x86_64.
          - runner: macos-14
            os: macos
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Update MoonBit registry
        run: moon update

      - name: Build binary
        run: |
          moon build cmd/main --target native --release --strip
          mkdir -p dist
          asset="apispec-${GITHUB_REF_NAME}-${{ matrix.os }}-${{ matrix.arch }}"
          cp _build/native/release/build/cmd/main/main.exe "dist/${asset}"
          chmod +x "dist/${asset}"
          "dist/${asset}" version

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.ref_name }}
        run: |
          gh release upload "$VERSION" dist/* --clobber

  update-homebrew-tap:
    needs: build
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.ref_name }}
      REPOSITORY: ${{ github.repository }}
      TAP_REPOSITORY: Showichiro/homebrew-tap

    steps:
      - name: Checkout tap
        uses: actions/checkout@v5
        with:
          repository: ${{ env.TAP_REPOSITORY }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update apispec formula
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu

          version_number="${VERSION#v}"
          linux_asset="apispec-${VERSION}-linux-x64"
          macos_asset="apispec-${VERSION}-macos-arm64"

          linux_url="$(gh release view "$VERSION" --repo "$REPOSITORY" --json assets --jq ".assets[] | select(.name == \"${linux_asset}\") | .url")"
          linux_sha="$(gh release view "$VERSION" --repo "$REPOSITORY" --json assets --jq ".assets[] | select(.name == \"${linux_asset}\") | .digest" | sed 's/^sha256://')"
          macos_url="$(gh release view "$VERSION" --repo "$REPOSITORY" --json assets --jq ".assets[] | select(.name == \"${macos_asset}\") | .url")"
          macos_sha="$(gh release view "$VERSION" --repo "$REPOSITORY" --json assets --jq ".assets[] | select(.name == \"${macos_asset}\") | .digest" | sed 's/^sha256://')"

          if [ -z "$linux_url" ] || [ -z "$linux_sha" ] || [ -z "$macos_url" ] || [ -z "$macos_sha" ]; then
            echo "missing release asset metadata for ${VERSION}" >&2
            gh release view "$VERSION" --repo "$REPOSITORY" --json assets
            exit 1
          fi

          cd homebrew-tap
          mkdir -p Formula
          cat > Formula/apispec.rb <<EOF
          class Apispec < Formula
            desc "Agent-friendly OpenAPI extraction CLI"
            homepage "https://github.com/Showichiro/moon_openapi_cli"
            version "${version_number}"
            license "Apache-2.0"

            on_macos do
              if Hardware::CPU.arm?
                url "${macos_url}"
                sha256 "${macos_sha}"
              end
            end

            on_linux do
              if Hardware::CPU.intel?
                url "${linux_url}"
                sha256 "${linux_sha}"
              end
            end

            def install
              bin.install Dir["apispec-*"].first => "apispec"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/apispec version")
              assert_match "\\"name\\": \\"endpoint.get\\"", shell_output("#{bin}/apispec describe --subcommand endpoint.get")
            end
          end
          EOF

          ruby -c Formula/apispec.rb

      - name: Commit tap update
        working-directory: homebrew-tap
        run: |
          set -eu
          if git diff --quiet -- Formula/apispec.rb; then
            echo "Homebrew formula already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/apispec.rb
          git commit -m "Update apispec to ${VERSION}"
          git push
